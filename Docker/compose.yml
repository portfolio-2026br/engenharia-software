---
services:
  apache:
    image: httpd:latest
    container_name: apache-portfolio
    hostname: apache-portfolio
    ports:
      - "80:80"
    volumes:
      - ./src/html:/usr/local/apache2/htdocs
    restart: always

  flask:
    build: ./src/
    container_name: flask-portfolio
    ports:
      - "8080:5000"
    restart: always
    environment:
      APP_PASSWORD: someone
      APP_USER: secret

  redis:
    image: "redis:alpine"
    container_name: redis-portfolio
    restart: always
